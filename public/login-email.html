<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Auth | Email Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="auth-common.js"></script>
    <script defer src="login-email.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Face Auth</a>
        <nav class="navlinks">
          <a href="/register.html">Register</a>
          <a href="/login.html">Login</a>
        </nav>
      </header>

      <main class="page">
        <section class="hero stack">
          <h1>Login with Email and Password</h1>
          <p class="subtitle">Enter the credentials used during registration.</p>
          <p id="flash" class="feedback hidden"></p>
        </section>

        <section class="card">
          <form id="emailLoginForm" class="stack" novalidate>
            <label for="email">
              Email
              <input id="email" type="email" placeholder="you@example.com" required />
            </label>
            <label for="password">
              Password
              <input id="password" type="password" placeholder="Your password" required />
            </label>

            <p id="feedback" class="feedback hidden"></p>

            <div class="actions">
              <button id="loginButton" type="submit">Login</button>
              <a class="button-link button-outline" href="/login-face.html">Use Face Login Instead</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
