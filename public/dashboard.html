<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Auth | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="auth-common.js"></script>
    <script defer src="dashboard.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Face Auth</a>
        <nav class="navlinks">
          <a href="/register.html">Register</a>
          <a href="/login.html">Login</a>
        </nav>
      </header>

      <main class="page">
        <section class="hero stack">
          <h1>Login Successful</h1>
          <p class="subtitle">You are authenticated. Current session details are shown below.</p>
          <p id="flash" class="feedback hidden"></p>
        </section>

        <section class="card stack">
          <h2>User Session</h2>
          <div class="kpi-grid">
            <div class="kpi">
              <p class="kpi-label">Email</p>
              <p id="userEmail" class="kpi-value">-</p>
            </div>
            <div class="kpi">
              <p class="kpi-label">Method</p>
              <p id="userMethod" class="kpi-value">-</p>
            </div>
            <div class="kpi">
              <p class="kpi-label">Created At</p>
              <p id="userCreatedAt" class="kpi-value">-</p>
            </div>
          </div>
          <div class="actions">
            <a class="button-link button-outline" href="/login.html">Switch Login Method</a>
            <button id="logoutButton" type="button" class="button-alt">Logout</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
