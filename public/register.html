<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Auth | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="auth-common.js"></script>
    <script defer src="register.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Face Auth</a>
        <nav class="navlinks">
          <a href="/register.html">Register</a>
          <a href="/login.html">Login</a>
        </nav>
      </header>

      <main class="page">
        <section class="hero stack">
          <h1>Register New User</h1>
          <p class="subtitle">Create account with email, password, and live camera capture only.</p>
        </section>

        <section class="card">
          <form id="registerForm" class="stack" novalidate>
            <div class="grid-two">
              <label for="email">
                Email
                <input id="email" type="email" placeholder="you@example.com" required />
              </label>
              <label for="password">
                Password
                <input id="password" type="password" placeholder="At least 6 characters" minlength="6" required />
              </label>
            </div>

            <h2>Camera Capture</h2>
            <video id="cameraView" class="preview camera-view camera-frame" autoplay muted playsinline></video>
            <img id="facePreview" class="preview camera-frame hidden" alt="Captured face preview" />

            <div class="actions">
              <button id="startCameraButton" type="button" class="button-outline">Start Camera</button>
              <button id="captureButton" type="button" class="button-alt" disabled>Capture Face</button>
              <button id="retakeButton" type="button" class="button-outline" disabled>Retake</button>
            </div>

            <p id="modelStatus" class="status">Loading face recognition models and camera...</p>
            <p id="feedback" class="feedback hidden"></p>

            <div class="actions">
              <button id="registerButton" type="submit" disabled>Register</button>
              <a class="button-link button-outline" href="/login.html">Already Registered? Login</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
